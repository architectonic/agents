name: agents-package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "schema/**"
      - "archetypes/**"
      - "templates/**"
      - "examples/**"
      - "dist/**"
      - "docs/**"
      - "scripts/validate_agents_package.py"
      - "scripts/instantiate_agent.py"
      - ".github/workflows/agents-package.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_agents_package.py
